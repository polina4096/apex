name: Lint

on:
  workflow_call:

jobs:
  linter:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install latest nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: rustfmt, clippy
      - name: Run cargo clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy -- -D warnings
